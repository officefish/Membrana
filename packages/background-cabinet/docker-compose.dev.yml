# Локальный PostgreSQL для разработки cabinet.
services:
  postgres:
    image: postgres:16-alpine
    ports:
      - '5434:5432'
    environment:
      POSTGRES_USER: membrana
      POSTGRES_PASSWORD: membrana
      POSTGRES_DB: membrana_cabinet
    volumes:
      - cabinet-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U membrana -d membrana_cabinet']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  cabinet-pg-data:
