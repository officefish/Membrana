# Fly.io app for background-office (Night Hunt cron)
# Deploy from repo root:
#   fly deploy --config deploy/fly.office.toml --dockerfile packages/background-office/Dockerfile

app = 'membrana-office-night-hunt'
primary_region = 'ams'

[build]
  dockerfile = 'packages/background-office/Dockerfile'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1

[env]
  NODE_ENV = 'production'
  PORT = '3000'
  LOG_LEVEL = 'info'
  NIGHT_HUNT_ENABLED = 'true'
  NIGHT_HUNT_BASE_BRANCH = 'techies68'
  OPENROUTER_MODEL = 'anthropic/claude-haiku-4.5'
