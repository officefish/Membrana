# Production overrides for VPS deploy (MP1).
# Usage:
#   docker compose \
#     -f packages/background-cabinet/docker-compose.yml \
#     -f deploy/background-cabinet.prod.compose.yml \
#     --env-file /etc/membrana/cabinet.env \
#     up -d

name: membrana-cabinet

services:
  postgres:
    ports: !override []
    restart: unless-stopped

  cabinet-api:
    restart: unless-stopped
    ports: !override
      - '127.0.0.1:${CABINET_API_PORT:-3020}:3020'
    networks:
      - default
      - membrana-platform

networks:
  membrana-platform:
    external: true
    name: membrana-platform

  cabinet-web:
    restart: unless-stopped
    ports: !override
      - '127.0.0.1:${CABINET_WEB_PORT:-8080}:80'
