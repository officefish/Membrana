# Production overrides for VPS deploy (O2).
# Usage on server:
#   docker compose \
#     -f packages/background-office/docker-compose.yml \
#     -f deploy/background-office.prod.compose.yml \
#     --env-file /etc/membrana/office.env \
#     up -d
#
# Do NOT commit real secrets. See docs/deploy/BACKGROUND_OFFICE_DEPLOY.md

name: membrana-office

services:
  office-api:
    restart: unless-stopped
    # Сборка через сеть хоста: на MSK-VDS (#349) docker-bridge NAT блэкхолит
    # крупные TLS-пакеты к Cloudflare (repo.yarnpkg.com), хост же ходит туда
    # напрямую. host-network на этапе build обходит кривой bridge.
    build:
      network: host
    # !override: bind API to localhost only (Caddy terminates TLS in O3)
    ports: !override
      - '127.0.0.1:${OFFICE_PORT:-3000}:3000'
    # PU1 (#463, ADR 0005): реестр партнёров панели переживает редеплой.
    # Явный дубль базового volume — прод-файл самодостаточен для чтения глазами.
    volumes:
      - panel-users-data:/var/lib/membrana-office

volumes:
  panel-users-data:
