# Yarn 4 конфигурация для монорепо Membrana

# Используем плоский node_modules — это совместимо с Vite, TypeScript project references,
# ESLint и всеми React-инструментами без дополнительной настройки.
# Альтернатива — PnP (Plug'n'Play): быстрее, но требует патчинга многих инструментов.
nodeLinker: node-modules

# Глобальный кеш — экономит трафик и место между проектами.
enableGlobalCache: true

# Не разрешать установку зависимостей, которые не указаны в package.json текущего workspace.
# Защищает от "случайной" работы кода благодаря hoisting-у.
enableStrictSsl: true

# Логи: показывать прогресс установки.
enableProgressBars: true

# Поведение при изменении lock-файла на CI.
enableImmutableInstalls: false
