# Выделенный прогон юнит-тестов всех воркспейсов через Turbo.
# В отличие от `ci.yml`, этот workflow запускает ТОЛЬКО `yarn turbo run test`,
# без lint/typecheck/build — чтобы быстро отлавливать падения тестов
# и иметь отдельный обязательный статус «Unit tests» в PR.
#
# Соответствует ролям «Структурщик» / Teamlead из docs/VIRTUAL_TEAM_PROMPT.md
# (контроль контрактов пакетов через автотесты).

name: Unit tests

on:
  push:
    branches: [main, master, develop, vesnin]
  pull_request:
    branches: [main, master, develop, vesnin]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Turbo unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # На раннере setup-node ставит Yarn 1, поэтому Yarn 4 активируем через Corepack.
      - name: Enable Corepack (Yarn 4 из packageManager)
        run: |
          corepack enable
          corepack prepare yarn@4.5.0 --activate
          echo "YARN_CACHE_FOLDER=$(yarn config get cacheFolder)" >> "$GITHUB_ENV"

      - name: Yarn Berry cache
        uses: actions/cache@v4
        with:
          path: ${{ env.YARN_CACHE_FOLDER }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Turbo — unit tests (все воркспейсы, без acceptance/integration)
        run: yarn turbo run test --continue

      - name: RAG — acceptance tests (keyword corpus I/O, timeout 30 s/тест)
        if: always()
        run: yarn workspace @membrana/rag-service test:acceptance

      - name: Harmonic — integration test (FFT processing, timeout 10 s)
        if: always()
        run: yarn workspace @membrana/harmonic-detector-service test:integration

      - name: Setup Node.js 22 (для TypeScript-native тестов)
        if: always()
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Client — TypeScript native tests (node:test, Node 22)
        if: always()
        run: yarn workspace @membrana/client test:node

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            packages/services/fft-analyzer/test-results/
            packages/core/test-results/
            packages/services/telemetry/test-results/
            packages/background-office/test-results/
            packages/services/rag/test-results/
            packages/services/detectors/harmonic/test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Unit tests (Membrana)"
            echo ""
            echo "- Unit tests: \`yarn turbo run test --continue\` (без acceptance/integration)"
            echo "- Acceptance: \`yarn workspace @membrana/rag-service test:acceptance\` (timeout 30 s/тест)"
            echo "- Integration: \`yarn workspace @membrana/harmonic-detector-service test:integration\` (timeout 10 s)"
            echo "- TS-native tests: \`yarn workspace @membrana/client test:node\` (node:test runner, Node 22)"
            echo "- Пакетный менеджер: **Yarn 4** (\`packageManager\` в корневом \`package.json\`)."
            echo ""
            echo "Локально перед PR выполните \`yarn test\` (см. \`docs/CONTRIBUTING.md\`)."
            echo ""
            echo "JSON-отчёты (fft-analyzer, core, telemetry, background-office, rag, harmonic) — artifact \`test-results\` этого прогона."
          } >> "$GITHUB_STEP_SUMMARY"
