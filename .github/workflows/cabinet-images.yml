# DR2 (deploy-pipeline-refactor): сборка прод-образов cabinet в CI и публикация в GHCR.
#
# Источник истины при деплое — иммутабельный образ из registry (его нельзя «недокоммитить»),
# а не сборка из рабочего дерева на VPS. Прод тянет образ по тегу: cabinet-vX.Y.Z или sha-<short>.
#
# Триггеры:
#   - push тега `cabinet-v*`  → релизный образ (теги: cabinet-vX.Y.Z, sha-<short>, latest)
#   - push в main             → образ main (теги: main, sha-<short>) для стейджа/проверки
#   - workflow_dispatch       → ручной прогон
#
# build-time env (VITE_*) запекается в образ cabinet-web здесь; runtime env (БД, токены, CORS)
# приходит в cabinet-api при старте контейнера из /etc/membrana/cabinet.env.

name: Cabinet images

on:
  push:
    branches: [main]
    tags: ['cabinet-v*']
  workflow_dispatch:

concurrency:
  group: cabinet-images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/officefish/membrana-cabinet-api
  IMAGE_WEB: ghcr.io/officefish/membrana-cabinet-web
  # build-time значения SPA (запекаются в бандл cabinet-web).
  VITE_CABINET_API_URL: https://cabinet.membrana.space
  VITE_MEDIA_API_URL: https://media.membrana.space

jobs:
  build-push:
    name: Build and push cabinet images
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata — cabinet-api
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_API }}
          tags: |
            type=ref,event=tag
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/cabinet-v') }}
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Metadata — cabinet-web
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_WEB }}
          tags: |
            type=ref,event=tag
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/cabinet-v') }}
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push cabinet-api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/background-cabinet/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha,scope=cabinet-api
          cache-to: type=gha,mode=max,scope=cabinet-api

      - name: Build and push cabinet-web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/cabinet/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            VITE_CABINET_API_URL=${{ env.VITE_CABINET_API_URL }}
            VITE_MEDIA_API_URL=${{ env.VITE_MEDIA_API_URL }}
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha,scope=cabinet-web
          cache-to: type=gha,mode=max,scope=cabinet-web

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Cabinet images"
            echo ""
            echo "- API: \`${{ steps.meta-api.outputs.tags }}\`"
            echo "- WEB: \`${{ steps.meta-web.outputs.tags }}\`"
            echo ""
            echo "Прод тянет образ по тегу: \`CABINET_IMAGE_TAG=cabinet-vX.Y.Z yarn cabinet:deploy:image:prod\`."
          } >> "$GITHUB_STEP_SUMMARY"
