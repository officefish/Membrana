name: Virtual team context

on:
  workflow_dispatch:
    inputs:
      task_hint:
        description: "Краткое описание задачи для агента (опционально)"
        required: false
        default: ""

jobs:
  print-context:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Emit agent context to job summary
        env:
          TASK_HINT: ${{ inputs.task_hint }}
        run: |
          {
            echo "## Virtual team — пути к документам"
            echo ""
            echo "Подключите эти файлы в контекст агента (Cursor, CLI, другой оркестратор):"
            echo ""
            echo "| Документ | Путь |"
            echo "|----------|------|"
            echo "| Промпт координатора | \`docs/VIRTUAL_TEAM_PROMPT.md\` |"
            echo "| Персонажи (role-промпты) | \`docs/virtual-team/PROMPT_*.md\` |"
            echo "| Музыкант (Boyarskiy) | \`docs/virtual-team/PROMPT_MUSICIAN.md\` · ветка \`boyarskiy\` |"
            echo "| Архитектура | \`docs/ARCHITECTURE.md\` |"
            echo "| Дизайн | \`docs/DESIGN.md\` |"
            echo "| UI/UX (верстка, темы) | \`docs/UI_UX_DEVELOPER_PROMPT.md\` |"
            echo "| Модули и плагины (UI) | \`docs/MODULE_AND_PLUGIN_UI.md\` |"
            echo "| Contributing / CI | \`docs/CONTRIBUTING.md\` |"
            echo "| MCP в процессе разработки | \`docs/MCP_INTEGRATION_STRATEGY.md\` · установка: \`docs/TZ_MCP_Servers_Membrana_v3.md\` |"
            echo ""
            echo "### Ежедневный цикл в GitHub Actions"
            echo "- **CI** (\`.github/workflows/ci.yml\`): push/PR в \`main\` / \`master\` / \`develop\` — \`yarn turbo run lint typecheck test build\`."
            echo "- **Scheduled CI** (\`.github/workflows/scheduled-ci.yml\`): по понедельникам + вручную."
            echo "- **Release** (\`.github/workflows/release.yml\`): тег \`v*\` — сборка и GitHub Release с автозаметками."
            echo "- **Optional Claude PR review** (\`.github/workflows/optional-claude-pr-review.yml\`): при \`vars.ENABLE_CLAUDE_PR_REVIEW == true\`; для API — секрет \`ANTHROPIC_API_KEY\`."
            echo "- **Deploy stub** (\`.github/workflows/deploy-stub.yml\`): ручной заготовочный workflow под ваш хостинг."
            echo ""
            echo "### Чеклист для одного прогона агента"
            echo "1. Прочитать \`docs/VIRTUAL_TEAM_PROMPT.md\`."
            echo "2. Для кода UI — \`docs/DESIGN.md\` и при необходимости \`docs/UI_UX_DEVELOPER_PROMPT.md\`."
            echo "3. Для границ модулей и плагинов — \`docs/ARCHITECTURE.md\` и \`docs/MODULE_AND_PLUGIN_UI.md\` (разметка, сайдбар)."
            echo "4. Для процесса PR и ссылок на CI — \`docs/CONTRIBUTING.md\`."
            echo "5. Если агент в Cursor/Claude Desktop с MCP — \`docs/MCP_INTEGRATION_STRATEGY.md\` (не заменяет \`yarn\`-ритуалы)."
            echo ""
            if [ -n "$TASK_HINT" ]; then
              echo "### Подсказка задачи от оператора"
              echo "$TASK_HINT"
              echo ""
            fi
            echo "_Workflow: \`.github/workflows/virtual-team-context.yml\`_"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Verify docs exist
        run: |
          set -e
          for f in docs/VIRTUAL_TEAM_PROMPT.md docs/ARCHITECTURE.md docs/DESIGN.md docs/CONTRIBUTING.md; do
            test -f "$f" || { echo "Missing $f"; exit 1; }
          done
          if [ -f docs/UI_UX_DEVELOPER_PROMPT.md ]; then
            echo "Optional UI/UX prompt present."
          else
            echo "Note: docs/UI_UX_DEVELOPER_PROMPT.md not found (optional)."
          fi
          test -f docs/MODULE_AND_PLUGIN_UI.md || { echo "Missing docs/MODULE_AND_PLUGIN_UI.md"; exit 1; }
          echo "All required docs present."
