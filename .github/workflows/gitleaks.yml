# Секрет-скан всего репозитория (лист №5 заседания security-posture, 19.07.2026).
# Baseline ложных срабатываний — .gitleaksignore (проверены вручную).
name: gitleaks

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.21.2
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks version

      - name: Scan full history
        run: ./gitleaks detect --source . --no-banner --redact -v
