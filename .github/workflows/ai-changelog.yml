name: AI Changelog Generator

on:
  push:
    tags:
      - 'v*'

jobs:
  generate-changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: AI Changelog Generation
        uses: anthropics/claude-code-action@v1
        with:
          task: |
            Сгенерируй CHANGELOG для всех измененных пакетов между тегом ${{ github.ref_name }} и предыдущим

            Для каждого пакета (@membrana/core, @membrana/agenda, @membrana/device-board, @membrana/client):
            - Что изменилось (используй commits)
            - Влияние на другие пакеты
            - Breaking changes
            - Миграция (если нужно)

            Формат: Keep a Changelog
            Язык: Русский (комментарии) + английский (технические термины)

          output_file: CHANGELOG_${{ github.ref_name }}.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: CHANGELOG_${{ github.ref_name }}.md
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') }}
