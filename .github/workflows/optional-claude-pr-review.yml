# Опционально: внешний обзор PR через Anthropic.
# Job: переменная репозитория ENABLE_CLAUDE_PR_REVIEW=true. Секрет ANTHROPIC_API_KEY — для шага с action (в if: у job нельзя использовать secrets.*).
# Не блокирует разработку: основной контроль — workflow **CI** (`ci.yml`).
# Соответствует идее «координатор + роли» из docs/VIRTUAL_TEAM_PROMPT.md (дополнительная вычитка, не замена ревью людей).

name: Optional Claude PR review

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'packages/**'
      - 'apps/**'
      - '.github/workflows/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  optional-review:
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_CLAUDE_PR_REVIEW == 'true' }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack (Yarn 4)
        run: |
          corepack enable
          corepack prepare yarn@4.5.0 --activate
          echo "YARN_CACHE_FOLDER=$(yarn config get cacheFolder)" >> "$GITHUB_ENV"

      - name: Yarn Berry cache
        uses: actions/cache@v4
        with:
          path: ${{ env.YARN_CACHE_FOLDER }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Quick compile check (affected packages)
        run: yarn turbo run build --continue

      - name: Claude PR review
        uses: anthropics/claude-code-action@v1
        continue-on-error: true
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          track_progress: 'false'
          display_report: 'true'
          prompt: |
            Ты помогаешь ревьюеру в монорепо Membrana (TypeScript, Yarn workspaces, Turbo).
            Сверься с docs/ARCHITECTURE.md (границы пакетов, плагины), docs/DESIGN.md (UI) и docs/CONTRIBUTING.md.
            Кратко: риски, нарушения архитектуры, тестируемость. Пиши по делу, без выдуманных путей к файлам.
