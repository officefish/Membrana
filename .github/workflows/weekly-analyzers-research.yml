# ЗАМОРОЖЕН 2026-07-17 (эпик #592, S5). Расписание снято.
# ─────────────────────────────────────────────────────────────────────────────
# Почему заморожен, а не удалён и не починен:
#   • Крон падал 9 раз подряд с 18.05 (два месяца): гейт ANTHROPIC_API_KEY проходит,
#     падает сам шаг Generate; причина из логов не извлечена — ОТДЕЛЬНАЯ работа вне #592.
#   • Артефакт docs/WEEKLY_ANALYZERS_RESEARCH.md не существовал нигде; readBoundedFile→null
#     → недельный план молча шёл дальше. Никто не заметил два месяца (ловушка «молчит≠успех»).
#   • Единственного потребителя (флаг includeAnalyzersResearch) убрал S4/Q5 — читать отчёт
#     теперь некому.
#   • Вердикт Q5 отправил его в отставку: место занял ночной ресёрч-контур (S6).
#   • Недельная заморожена словом владельца («пока») — крон замерзает вместе с ней.
# Заморозка обратима: удаление потеряло бы историю 9 падений и замысел; расписание
# вернуть = раскомментировать блок schedule ниже. Ручной запуск сохранён для отладки
# причины падений, когда/если до неё дойдут руки.
# ─────────────────────────────────────────────────────────────────────────────
#
# (историческое) Еженедельный «радар» внешних аналайзеров: HuggingFace Hub + arXiv,
# сопоставление с §4 docs/INTEGRATIONS_STRATEGY.md, генерация WEEKLY_ANALYZERS_RESEARCH.md.
# Требует секрет ANTHROPIC_API_KEY; опц. vars.ANTHROPIC_MODEL.

name: Weekly analyzers research (FROZEN — #592 S5)

on:
  # ЗАМОРОЖЕНО #592 S5 — расписание снято (см. шапку). Разморозка = раскомментировать:
  # schedule:
  #   - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      since_days:
        description: 'Окно поиска новых HF-моделей в днях (по умолчанию 7).'
        required: false
        default: ''
      dry_run:
        description: 'Только собрать источники, без вызова Anthropic (для отладки).'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: weekly-analyzers-research
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  research-week:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack (Yarn 4)
        run: |
          corepack enable
          corepack prepare yarn@4.5.0 --activate
          echo "YARN_CACHE_FOLDER=$(yarn config get cacheFolder)" >> "$GITHUB_ENV"

      - name: Yarn Berry cache
        uses: actions/cache@v4
        with:
          path: ${{ env.YARN_CACHE_FOLDER }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Verify ANTHROPIC_API_KEY (skipped in dry-run)
        if: ${{ inputs.dry_run != 'true' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "${ANTHROPIC_API_KEY}" ]; then
            echo "::error::Секрет ANTHROPIC_API_KEY не задан. Добавьте в Settings → Secrets and variables → Actions → New repository secret."
            exit 1
          fi

      - name: Generate weekly analyzers research
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
          RESEARCH_SINCE_DAYS: ${{ inputs.since_days }}
          RESEARCH_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          ARGS=()
          if [ -n "${RESEARCH_SINCE_DAYS:-}" ]; then
            ARGS+=("--since-days=${RESEARCH_SINCE_DAYS}")
          fi
          if [ "${RESEARCH_DRY_RUN:-}" = "true" ]; then
            ARGS+=("--dry-run")
          fi
          node scripts/analyzers-research-week.mjs "${ARGS[@]}"

      - name: Commit and push if changed
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain docs/WEEKLY_ANALYZERS_RESEARCH.md)" ]; then
            git add docs/WEEKLY_ANALYZERS_RESEARCH.md
            git commit -m "docs(research): обновлён еженедельный радар аналайзеров [skip ci]"
            git push origin HEAD:${GITHUB_REF_NAME}
            echo "RESEARCH_COMMITTED=true" >> "$GITHUB_ENV"
          else
            echo "Файл docs/WEEKLY_ANALYZERS_RESEARCH.md не изменился — коммитить нечего."
            echo "RESEARCH_COMMITTED=false" >> "$GITHUB_ENV"
          fi

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Weekly analyzers research"
            echo ""
            echo "- Скрипт: \`yarn analyzers:research:week\` (см. \`scripts/analyzers-research-week.mjs\`)."
            echo "- Источники: HuggingFace Hub (audio-classification) + arXiv (cs.SD / eess.AS)."
            echo "- Каталог-источник: \`docs/INTEGRATIONS_STRATEGY.md\` §4."
            echo "- Выход: \`docs/WEEKLY_ANALYZERS_RESEARCH.md\`."
            if [ "${{ inputs.dry_run }}" = "true" ]; then
              echo "- Режим: \`--dry-run\` (без Anthropic, без коммита)."
            elif [ "${RESEARCH_COMMITTED:-false}" = "true" ]; then
              echo "- Результат: коммит запушен в \`${GITHUB_REF_NAME}\`."
            else
              echo "- Результат: изменений не было или генерация не дошла до коммита."
            fi
            echo ""
            echo "Документ учитывается только недельным планировщиком \`yarn plan:week\` и не участвует в ежедневном code-review."
          } >> "$GITHUB_STEP_SUMMARY"
