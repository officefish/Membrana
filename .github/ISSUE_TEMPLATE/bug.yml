name: Bug — замечание / баг / регрессия
description: Что-то работает не так, как ожидалось
title: '[Bug] '
labels:
  - bug
  - 'status:triage'
body:
  - type: markdown
    attributes:
      value: |
        Спасибо, что нашли проблему. После триажа Teamlead заведёт ticket в Linear,
        где пойдёт диагностика и исправление. Жизненный цикл:
        [docs/TASKS_MANAGEMENT.md](../blob/main/docs/TASKS_MANAGEMENT.md).
  - type: textarea
    id: summary
    attributes:
      label: Что не работает
      description: Одной фразой опишите проблему.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Шаги для воспроизведения
      placeholder: |
        1. Открыть …
        2. Нажать …
        3. Увидеть …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Ожидаемое поведение
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Фактическое поведение
      description: По возможности — приложите логи, скриншоты, текст ошибки.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Окружение
      description: Браузер, ОС, ветка, коммит — что релевантно.
      placeholder: 'Chrome 128, macOS 14, main @ abc1234'
    validations:
      required: false
  - type: input
    id: white-paper
    attributes:
      label: Связь с WHITE_PAPER.md (опционально)
      placeholder: 'Этап 0 — Фундамент'
    validations:
      required: false
  - type: checkboxes
    id: declaration
    attributes:
      label: Понимаю процесс
      options:
        - label: Прочитал(а) [docs/TASKS_MANAGEMENT.md](../blob/main/docs/TASKS_MANAGEMENT.md) и понимаю, что внутренние обсуждения пойдут в Linear, а перед закрытием Issue здесь будет формальный отчёт.
          required: true
